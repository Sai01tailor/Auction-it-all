<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BidKar War Room Simulator</title>
    <!-- Import Socket.io Client -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: #fff; }
        .panel { border: 1px solid #444; padding: 15px; margin-bottom: 20px; background: #2a2a2a; }
        input, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        #logs { background: #000; color: #0f0; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; }
        .alert { color: #ff4444; }
        .success { color: #00ff00; }
        .update { color: #ffcc00; }
    </style>
</head>
<body>
    <h2>🚀 BidKar Socket Simulator</h2>
    
    <div class="panel">
        <h3>1. Authentication & Connection</h3>
        <input type="text" id="token" placeholder="Paste JWT Token Here...">
        <button onclick="connectSocket()">Connect to Server</button>
    </div>

    <div class="panel">
        <h3>2. Join Auction Room</h3>
        <input type="text" id="auctionId" placeholder="Paste MongoDB Item ID Here...">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div class="panel">
        <h3>3. Place Bid</h3>
        <input type="number" id="bidAmount" placeholder="Enter Bid Amount (₹)">
        <button onclick="placeBid()">Fire Bid!</button>
    </div>

    <h3>Live Console Logs:</h3>
    <div id="logs"></div>

    <script>
        let socket;

        function log(message, type = '') {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function connectSocket() {
            const token = document.getElementById('token').value;
            // Connect to your local backend
            socket = io("http://localhost:3000", {
                auth: { token: token }
            });

            socket.on("connect", () => log("✅ Connected to Server! Socket ID: " + socket.id, "success"));
            socket.on("connect_error", (err) => log("❌ Connection Error: " + err.message, "alert"));

            // Listeners for your backend events
            socket.on("new_bid_update", (data) => log(`📢 ROOM UPDATE: New Highest Bid is ₹${data.newHighestBid} by User: ${data.bidderId}`, "update"));
            socket.on("bid_accepted", (data) => log(`✅ SUCCESS: ${data.message} (Remaining Power: ₹${data.remainingBiddingPower})`, "success"));
            socket.on("bid_rejected", (data) => log(`❌ REJECTED: ${data.message}`, "alert"));
            socket.on("outbid_alert", (data) => {
                log(`🚨 ALERT: ${data.title} - ${data.message}`, "alert");
                alert("POPUP NOTIFICATION: You have been outbid!"); // Simulates the React Toast
            });
        }

        function joinRoom() {
            const auctionId = document.getElementById('auctionId').value;
            socket.emit("join_auction", auctionId);
            log(`🚪 Joined Room: auction:${auctionId}`);
        }

        function placeBid() {
            const auctionId = document.getElementById('auctionId').value;
            const amount = document.getElementById('bidAmount').value;
            socket.emit("place_bid", { auctionId, amount: Number(amount) });
            log(`🚀 Fired bid for ₹${amount}...`);
        }
    </script>
</body>
</html>
