<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BidKar War Room Simulator</title>
    <!-- Pulling directly from your local server -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background: #1e1e1e; color: #fff; }
        .panel { border: 1px solid #444; padding: 15px; margin-bottom: 20px; background: #2a2a2a; }
        .panel.danger { border-color: #ffaa00; background: #332200; }
        input, button { padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.btn-danger { background: #ffaa00; color: #000; }
        button.btn-danger:hover { background: #cc8800; }
        #logs { background: #000; color: #0f0; padding: 10px; height: 300px; overflow-y: scroll; font-family: monospace; }
        .alert { color: #ff4444; }
        .success { color: #00ff00; }
        .update { color: #ffcc00; }
    </style>
</head>
<body>
    <h2>🚀 BidKar Socket Simulator</h2>
    
    <div class="panel">
        <h3>1. Authentication & Connection</h3>
        <input type="text" id="token" placeholder="Paste JWT Token Here...">
        <button onclick="connectSocket()">Connect to Server</button>
    </div>

    <div class="panel">
        <h3>2. Join Auction Room</h3>
        <input type="text" id="auctionId" placeholder="Paste MongoDB Item ID Here...">
        <button onclick="joinRoom()">Join Room</button>
    </div>

    <div class="panel">
        <h3>3. Place Standard Bid</h3>
        <input type="number" id="bidAmount" placeholder="Enter Bid Amount (₹)">
        <button onclick="placeBid()">Fire Bid!</button>
    </div>

    <div class="panel danger">
        <h3 style="color: #ffaa00;">⚠️ 4. Race Condition Tester (Simultaneous Bids)</h3>
        <p style="font-size: 12px; margin-top: -10px;">This will fire two bids at the exact same millisecond to test your Redis Distributed Lock.</p>
        <input type="text" id="tokenA" placeholder="Token A (User 1)">
        <input type="text" id="tokenB" placeholder="Token B (User 2)">
        <input type="number" id="raceAmount" placeholder="Bid Amount for BOTH (e.g. 50000)">
        <button class="btn-danger" onclick="testRaceCondition()">🔥 Nuke! Fire Both Simultaneously!</button>
    </div>

    <h3>Live Console Logs:</h3>
    <div id="logs"></div>

    <script>
        let socket;
        // Matches your Node.js server port
        const SERVER_URL = "http://localhost:3000"; 

        function log(message, type = '') {
            const logs = document.getElementById('logs');
            logs.innerHTML += `<div class="${type}">[${new Date().toLocaleTimeString()}] ${message}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        function connectSocket() {
            const token = document.getElementById('token').value;
            // THE FIX: transports: ["websocket"] bypasses Express CORS
            socket = io(SERVER_URL, { 
                auth: { token: token },
                transports: ["websocket"]
            });

            socket.on("connect", () => log("✅ Connected to Server! Socket ID: " + socket.id, "success"));
            socket.on("connect_error", (err) => log("❌ Connection Error: " + err.message, "alert"));

            socket.on("new_bid_update", (data) => log(`📢 ROOM UPDATE: New Highest Bid is ₹${data.newHighestBid} by User: ${data.bidderId}`, "update"));
            socket.on("bid_accepted", (data) => log(`✅ SUCCESS: ${data.message}`, "success"));
            socket.on("bid_rejected", (data) => log(`❌ REJECTED: ${data.message}`, "alert"));
            socket.on("outbid_alert", (data) => log(`🚨 POPUP ALERT: ${data.title} - ${data.message}`, "alert"));
        }

        function joinRoom() {
            const auctionId = document.getElementById('auctionId').value;
            socket.emit("join_auction", auctionId);
            log(`🚪 Joined Room: auction:${auctionId}`);
        }

        function placeBid() {
            const auctionId = document.getElementById('auctionId').value;
            const amount = document.getElementById('bidAmount').value;
            socket.emit("place_bid", { auctionId, amount: Number(amount) });
            log(`🚀 Fired standard bid for ₹${amount}...`);
        }

        // --- THE RACE CONDITION TESTER ---
        function testRaceCondition() {
            const tokenA = document.getElementById('tokenA').value;
            const tokenB = document.getElementById('tokenB').value;
            const auctionId = document.getElementById('auctionId').value;
            const amount = Number(document.getElementById('raceAmount').value);

            if(!tokenA || !tokenB || !auctionId) return alert("Please fill Tokens and Item ID first!");

            log(`⚙️ Setting up Race Condition... connecting both users...`, "update");

            // THE FIX: transports: ["websocket"] added here too
            const socketA = io(SERVER_URL, { auth: { token: tokenA }, transports: ["websocket"] });
            const socketB = io(SERVER_URL, { auth: { token: tokenB }, transports: ["websocket"] });

            let connectedCount = 0;
            const fireWhenReady = () => {
                connectedCount++;
                if(connectedCount === 2) {
                    log(`🔥 FIRING BOTH BIDS AT THE EXACT SAME MILLISECOND!`, "alert");
                    // These execute simultaneously 
                    socketA.emit('place_bid', { auctionId, amount });
                    socketB.emit('place_bid', { auctionId, amount });
                }
            };

            socketA.on('connect', fireWhenReady);
            socketB.on('connect', fireWhenReady);

            socketA.on('connect_error', (err) => log("❌ User A Connection Error: " + err.message, "alert"));
            socketB.on('connect_error', (err) => log("❌ User B Connection Error: " + err.message, "alert"));

            socketA.on('bid_accepted', () => log("🏆 USER A WON THE RACE! Bid Accepted.", "success"));
            socketA.on('bid_rejected', (data) => log("🛡️ USER A BOUNCED BY REDIS: " + data.message, "alert"));
            
            socketB.on('bid_accepted', () => log("🏆 USER B WON THE RACE! Bid Accepted.", "success"));
            socketB.on('bid_rejected', (data) => log("🛡️ USER B BOUNCED BY REDIS: " + data.message, "alert"));
        }
    </script>
</body>
</html>
